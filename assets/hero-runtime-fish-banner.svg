<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tracey Runtime Public Test banner</title>
  <desc id="desc">Dark runtime architecture banner with fish motif, boundary frames, verification nodes, and Tracey Runtime Public Test title.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1520" y2="580" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#071522"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 200) rotate(32) scale(420 260)">
      <stop stop-color="#0EA5E9" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 430) rotate(-18) scale(360 220)">
      <stop stop-color="#14B8A6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boundary" x1="220" y1="130" x2="1380" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="fishFill" x1="612" y1="225" x2="1018" y2="415" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="0.35" stop-color="#67E8F9"/>
      <stop offset="0.72" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="tailFill" x1="588" y1="228" x2="730" y2="414" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#0EA5A4"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.7"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#67E8F9"/>
    </marker>
  </defs>

  <rect width="1600" height="640" rx="32" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="32" fill="url(#grid)" opacity="0.65"/>
  <rect width="1600" height="640" rx="32" fill="url(#glowLeft)"/>
  <rect width="1600" height="640" rx="32" fill="url(#glowRight)"/>

  <g opacity="0.25">
    <circle cx="250" cy="146" r="3" fill="#67E8F9"/>
    <circle cx="1318" cy="510" r="3" fill="#2DD4BF"/>
    <circle cx="1180" cy="136" r="3" fill="#67E8F9"/>
    <circle cx="352" cy="508" r="3" fill="#2DD4BF"/>
  </g>

  <rect x="170" y="110" width="1260" height="420" rx="104" stroke="url(#boundary)" stroke-width="6" opacity="0.95"/>
  <rect x="205" y="145" width="1190" height="350" rx="80" stroke="#7DD3FC" stroke-opacity="0.16" stroke-width="2"/>
  <rect x="237" y="177" width="1126" height="286" rx="60" fill="#081221" fill-opacity="0.24" stroke="#94A3B8" stroke-opacity="0.08"/>

  <g opacity="0.9">
    <path d="M300 212H438" stroke="#67E8F9" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1162 212H1300" stroke="#67E8F9" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M300 430H438" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1162 430H1300" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M462 320H596" stroke="#67E8F9" stroke-opacity="0.7" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M1004 320H1138" stroke="#2DD4BF" stroke-opacity="0.7" stroke-width="2" stroke-dasharray="8 8"/>
  </g>

  <g>
    <rect x="266" y="196" width="170" height="58" rx="14" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text x="286" y="220" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">INPUT</text>
    <text x="286" y="242" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">explore</text>

    <rect x="266" y="286" width="170" height="58" rx="14" fill="#0F172A" stroke="#60A5FA" stroke-opacity="0.45"/>
    <text x="286" y="310" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">MONITOR</text>
    <text x="286" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">evidence</text>

    <rect x="266" y="376" width="170" height="58" rx="14" fill="#0F172A" stroke="#14B8A6" stroke-opacity="0.45"/>
    <text x="286" y="400" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">GATE</text>
    <text x="286" y="422" fill="#5EEAD4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">verify</text>
  </g>

  <g>
    <rect x="1164" y="196" width="170" height="58" rx="14" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
    <text x="1184" y="220" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">BOUNDARY</text>
    <text x="1184" y="242" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">contracts</text>

    <rect x="1164" y="286" width="170" height="58" rx="14" fill="#0F172A" stroke="#60A5FA" stroke-opacity="0.45"/>
    <text x="1184" y="310" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">CHECK</text>
    <text x="1184" y="332" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">tests</text>

    <rect x="1164" y="376" width="170" height="58" rx="14" fill="#0F172A" stroke="#14B8A6" stroke-opacity="0.45"/>
    <text x="1184" y="400" fill="#E2E8F0" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1.5">SURFACE</text>
    <text x="1184" y="422" fill="#5EEAD4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">viewer-only</text>
  </g>

  <g filter="url(#softGlow)">
    <ellipse cx="832" cy="320" rx="230" ry="118" fill="#0EA5E9" fill-opacity="0.08"/>
    <path d="M1018 320C956 232 848 194 740 206C784 248 807 289 808 320C807 351 784 392 740 434C848 446 956 408 1018 320Z" fill="url(#fishFill)"/>
    <path d="M710 252C670 222 622 206 575 206C616 241 639 279 642 320C639 361 616 399 575 434C622 434 670 418 710 388" fill="url(#tailFill)"/>
    <path d="M724 268C760 288 780 301 796 320C780 339 760 352 724 372" stroke="#ECFEFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M870 242C911 255 946 281 970 320C946 359 911 385 870 398" stroke="#E0F2FE" stroke-opacity="0.42" stroke-width="5" stroke-linecap="round"/>
    <circle cx="892" cy="292" r="7" fill="#0B1220"/>
    <path d="M792 320H858" stroke="url(#signal)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="824" cy="320" r="5" fill="#E0FBFF"/>
  </g>

  <g opacity="0.95">
    <text x="242" y="278" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700">Tracey Runtime Public Test</text>
    <text x="242" y="328" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">evidence • verification • boundary hygiene</text>
    <text x="242" y="394" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">A runtime-discipline harness for AI-assisted work.</text>
    <text x="242" y="436" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16" letter-spacing="1.4">MONITOR BEFORE COMMIT  ·  EVIDENCE IS NOT AUTHORITY  ·  VIEWER IS NOT ACTOR</text>
  </g>

  <g opacity="0.72">
    <rect x="241" y="156" width="188" height="28" rx="14" fill="#082F49" stroke="#38BDF8" stroke-opacity="0.4"/>
    <circle cx="262" cy="170" r="5" fill="#22D3EE"/>
    <text x="276" y="175" fill="#BAE6FD" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">PUBLIC TEST HARNESS</text>
  </g>
</svg>
